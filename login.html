<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Portal | QatarMobileOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Inter', 'sans-serif'] }, 
                    colors: { brand: '#4F46E5', 'brand-dark': '#312E81', pos: '#10B981', 'pos-dark': '#059669' },
                    animation: { 'spin-slow': 'spin 2s linear infinite' }
                } 
            } 
        }
    </script>
    <style>
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .tab-active-admin { border-bottom-color: #4F46E5; color: #4F46E5; background-color: #EEF2FF; }
        .tab-active-pos { border-bottom-color: #10B981; color: #10B981; background-color: #ECFDF5; }
        /* Hide number input spinners */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-gray-100 font-sans h-screen flex flex-col items-center justify-center antialiased relative overflow-hidden selection:bg-brand selection:text-white">
    
    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
        <div class="absolute top-[-20%] left-[-10%] w-[500px] h-[500px] bg-indigo-500/10 rounded-full blur-3xl"></div>
        <div class="absolute bottom-[-20%] right-[-10%] w-[500px] h-[500px] bg-emerald-500/10 rounded-full blur-3xl"></div>
    </div>

    <div class="relative z-10 w-full max-w-md px-4">
        
        <div class="mb-8 text-center flex flex-col items-center">
            <div class="w-12 h-12 bg-gradient-to-br from-gray-900 to-gray-700 rounded-xl flex items-center justify-center text-white font-extrabold text-xl mb-4 shadow-lg shadow-gray-900/20 transform hover:scale-105 transition-transform">
                <i class="fa-solid fa-layer-group text-sm"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-gray-900 tracking-tight">System Access Portal</h1>
            <p class="text-gray-500 text-sm mt-1.5 font-medium">QatarMobileOS Enterprise Architecture</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl shadow-gray-200/50 border border-gray-200 overflow-hidden glass-panel">
            
            <div class="flex border-b border-gray-200">
                <button id="tab-admin" onclick="switchTab('admin')" class="flex-1 py-4 text-sm font-bold border-b-2 transition-colors duration-200 tab-active-admin flex items-center justify-center gap-2">
                    <i class="fa-solid fa-shield-halved"></i> Corporate HQ
                </button>
                <button id="tab-pos" onclick="switchTab('pos')" class="flex-1 py-4 text-sm font-bold border-b-2 border-transparent text-gray-500 hover:text-gray-900 hover:bg-gray-50 transition-colors duration-200 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-cash-register"></i> Terminal POS
                </button>
            </div>

            <div class="p-8">
                <form id="form-admin" onsubmit="handleLogin(event, 'admin')" class="space-y-5 block animate-fadeIn">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1.5 uppercase tracking-wide">Enterprise Email</label>
                        <div class="relative">
                            <i class="fa-regular fa-envelope absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="email" id="admin-email" required placeholder="admin@qatarmobile.qa" class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-all" value="admin@qatarmobile.qa">
                        </div>
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-1.5">
                            <label class="block text-xs font-bold text-gray-700 uppercase tracking-wide">Secure Password</label>
                            <a href="#" class="text-xs font-semibold text-brand hover:text-brand-dark">Forgot?</a>
                        </div>
                        <div class="relative">
                            <i class="fa-solid fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="password" id="admin-pass" required placeholder="••••••••" class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-brand focus:border-brand outline-none transition-all" value="password123">
                        </div>
                    </div>
                    <div class="flex items-center mt-2">
                        <input type="checkbox" id="remember" class="w-4 h-4 text-brand bg-gray-100 border-gray-300 rounded focus:ring-brand">
                        <label for="remember" class="ml-2 text-xs font-medium text-gray-600">Keep session active on this device</label>
                    </div>
                    <button type="submit" id="btn-admin" class="w-full bg-brand text-white py-3 rounded-xl font-bold text-sm hover:bg-brand-dark focus:ring-4 focus:ring-indigo-100 transition-all shadow-md shadow-brand/20 flex items-center justify-center gap-2 mt-4">
                        <span>Authenticate Session</span> <i class="fa-solid fa-arrow-right-to-bracket"></i>
                    </button>
                </form>

                <form id="form-pos" onsubmit="handleLogin(event, 'pos')" class="space-y-5 hidden animate-fadeIn">
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1.5 uppercase tracking-wide">Operational Branch Node</label>
                        <div class="relative">
                            <i class="fa-solid fa-location-dot absolute left-3 top-1/2 transform -translate-y-1/2 text-pos"></i>
                            <select id="pos-branch" required class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-pos focus:border-pos outline-none transition-all appearance-none cursor-pointer">
                                <option value="" disabled>Select Outlet Location...</option>
                                <option value="vendome" selected>Place Vendôme Flagship (Lusail)</option>
                                <option value="moq">Mall of Qatar Hub</option>
                                <option value="doha-cc">Doha City Center Branch</option>
                            </select>
                            <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1.5 uppercase tracking-wide">Terminal ID</label>
                        <div class="relative">
                            <i class="fa-solid fa-display absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <select id="pos-terminal" required class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-pos focus:border-pos outline-none transition-all appearance-none cursor-pointer">
                                <option value="T-01">Register T-01 (Main Floor)</option>
                                <option value="T-02" selected>Register T-02 (Accessories)</option>
                                <option value="T-03">Register T-03 (Service Desk)</option>
                            </select>
                            <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 text-xs pointer-events-none"></i>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-700 mb-1.5 uppercase tracking-wide">Operator PIN</label>
                        <div class="relative">
                            <i class="fa-solid fa-key absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="password" id="pos-pin" required placeholder="4-Digit Code" pattern="[0-9]{4}" maxlength="4" class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-pos focus:border-pos outline-none transition-all font-mono tracking-widest text-lg" value="1234">
                        </div>
                    </div>
                    <button type="submit" id="btn-pos" class="w-full bg-pos text-white py-3 rounded-xl font-bold text-sm hover:bg-pos-dark focus:ring-4 focus:ring-emerald-100 transition-all shadow-md shadow-emerald-500/20 flex items-center justify-center gap-2 mt-4">
                        <span>Unlock Terminal</span> <i class="fa-solid fa-unlock-keyhole"></i>
                    </button>
                </form>

                <div id="auth-feedback" class="hidden mt-4 p-3 rounded-xl text-sm font-semibold flex items-center justify-center gap-2 transition-all">
                </div>
            </div>
            
            <div class="bg-gray-50 p-4 border-t border-gray-100 text-center flex justify-between items-center">
                <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider"><i class="fa-solid fa-shield-check text-emerald-500 mr-1"></i> QCB / ZATCA Compliant Node</span>
                <span class="text-[10px] text-gray-400 font-mono">v4.2.0-stable</span>
            </div>
        </div>

        <div class="mt-8 text-center">
            <a href="index.html" class="text-xs font-semibold text-gray-500 hover:text-gray-900 transition-colors bg-white px-4 py-2 rounded-full shadow-sm border border-gray-200"><i class="fa-solid fa-arrow-left mr-1.5"></i> Return to Main Site</a>
        </div>
    </div>

    <script>
        // Tab Switching Logic
        function switchTab(tabType) {
            const adminTab = document.getElementById('tab-admin');
            const posTab = document.getElementById('tab-pos');
            const adminForm = document.getElementById('form-admin');
            const posForm = document.getElementById('form-pos');
            const feedback = document.getElementById('auth-feedback');

            // Reset feedback
            feedback.classList.add('hidden');

            if (tabType === 'admin') {
                adminTab.className = "flex-1 py-4 text-sm font-bold border-b-2 transition-colors duration-200 tab-active-admin flex items-center justify-center gap-2";
                posTab.className = "flex-1 py-4 text-sm font-bold border-b-2 border-transparent text-gray-500 hover:text-gray-900 hover:bg-gray-50 transition-colors duration-200 flex items-center justify-center gap-2";
                adminForm.classList.remove('hidden');
                posForm.classList.add('hidden');
            } else {
                posTab.className = "flex-1 py-4 text-sm font-bold border-b-2 transition-colors duration-200 tab-active-pos flex items-center justify-center gap-2";
                adminTab.className = "flex-1 py-4 text-sm font-bold border-b-2 border-transparent text-gray-500 hover:text-gray-900 hover:bg-gray-50 transition-colors duration-200 flex items-center justify-center gap-2";
                posForm.classList.remove('hidden');
                adminForm.classList.add('hidden');
            }
        }

        // Mock Authentication Logic
        function handleLogin(event, type) {
            event.preventDefault(); // Prevent actual form submission
            
            const btn = document.getElementById(`btn-${type}`);
            const originalBtnContent = btn.innerHTML;
            const feedback = document.getElementById('auth-feedback');
            
            // Set loading state
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin"></i> Verifying Credentials...`;
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            feedback.classList.add('hidden');

            // Simulate Network Request (1.5 seconds)
            setTimeout(() => {
                // Success State
                btn.innerHTML = `<i class="fa-solid fa-check"></i> Handshake Successful`;
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
                
                feedback.innerHTML = `<i class="fa-solid fa-shield-check"></i> Connection established. Redirecting...`;
                feedback.className = `mt-4 p-3 rounded-xl text-xs font-bold flex items-center justify-center gap-2 transition-all ${type === 'admin' ? 'bg-indigo-50 text-brand border border-indigo-100' : 'bg-emerald-50 text-emerald-600 border border-emerald-100'}`;
                feedback.classList.remove('hidden');

                // Redirect to respective dashboard
                setTimeout(() => {
                    if (type === 'admin') {
                        window.location.href = 'dashboard.html';
                    } else {
                        window.location.href = 'pos.html';
                    }
                }, 800);

            }, 1500);
        }
    </script>
</body>
</html>
