<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Settings | QatarMobileOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: { 
                extend: { 
                    fontFamily: { sans: ['Inter', 'sans-serif'] }, 
                    colors: { brand: '#4F46E5', 'brand-dark': '#312E81' } 
                } 
            } 
        }
    </script>
</head>
<body class="bg-gray-50/50 font-sans flex h-screen antialiased text-gray-900 overflow-hidden dark:bg-gray-900 dark:text-white relative">

    <div id="sidebar-overlay" class="fixed inset-0 bg-gray-900/50 z-30 hidden lg:hidden" onclick="toggleSidebar()"></div>

    <aside id="mobile-sidebar" class="w-64 bg-white border-r border-gray-200 flex flex-col shrink-0 z-40 shadow-lg shadow-gray-200/40 absolute inset-y-0 left-0 transform -translate-x-full lg:relative lg:translate-x-0 transition-transform duration-300 ease-in-out dark:bg-gray-800 dark:border-gray-700">
        <div class="h-16 flex items-center px-6 border-b border-gray-100 dark:border-gray-700">
            <div class="w-8 h-8 bg-gradient-to-br from-brand to-brand-dark rounded-xl flex items-center justify-center text-white font-extrabold mr-3">
                <i class="fa-solid fa-layer-group text-xs"></i>
            </div>
            <span class="font-extrabold text-lg tracking-tight">QatarMobileOS</span>
        </div>
        
        <nav class="flex-1 px-4 py-6 space-y-1.5 overflow-y-auto">
            <p class="px-3 text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3">Enterprise Core</p>
            <a href="dashboard.html" class="flex items-center px-3 py-2.5 text-gray-500 hover:bg-gray-50 rounded-xl font-semibold transition-all group dark:text-gray-300 dark:hover:bg-gray-700"><i class="fa-solid fa-chart-pie w-5 text-sm group-hover:text-brand"></i><span class="ml-2.5 text-sm">HQ Overview</span></a>
            <a href="inventory.html" class="flex items-center px-3 py-2.5 text-gray-500 hover:bg-gray-50 rounded-xl font-semibold transition-all group dark:text-gray-300 dark:hover:bg-gray-700"><i class="fa-solid fa-boxes-stacked w-5 text-sm group-hover:text-brand"></i><span class="ml-2.5 text-sm">Global Inventory</span></a>
            <a href="orders.html" class="flex items-center px-3 py-2.5 text-gray-500 hover:bg-gray-50 rounded-xl font-semibold transition-all group dark:text-gray-300 dark:hover:bg-gray-700"><i class="fa-solid fa-receipt w-5 text-sm group-hover:text-brand"></i><span class="ml-2.5 text-sm">Order Fulfillment</span></a>
            <a href="analytics.html" class="flex items-center px-3 py-2.5 text-gray-500 hover:bg-gray-50 rounded-xl font-semibold transition-all group dark:text-gray-300 dark:hover:bg-gray-700"><i class="fa-solid fa-chart-line w-5 text-sm group-hover:text-brand"></i><span class="ml-2.5 text-sm">Deep Analytics</span></a>
            <a href="customers.html" class="flex items-center px-3 py-2.5 text-gray-500 hover:bg-gray-50 hover:text-gray-900 rounded-xl font-semibold transition-all group relative dark:text-gray-300 dark:hover:bg-gray-700"><i class="fa-solid fa-users w-5 text-sm group-hover:text-brand transition-colors"></i><span class="ml-2.5 text-sm">Customer CRM</span></a>
            <p class="px-3 text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-8 mb-3">Management</p>
            <a href="outlets.html" class="flex items-center px-3 py-2.5 text-gray-500 hover:bg-gray-50 rounded-xl font-semibold transition-all group dark:text-gray-300 dark:hover:bg-gray-700"><i class="fa-solid fa-store w-5 text-sm group-hover:text-brand"></i><span class="ml-2.5 text-sm">Branch Outlets</span></a>
            <a href="staff.html" class="flex items-center px-3 py-2.5 text-gray-500 hover:bg-gray-50 rounded-xl font-semibold transition-all group dark:text-gray-300 dark:hover:bg-gray-700"><i class="fa-solid fa-id-badge w-5 text-sm group-hover:text-brand"></i><span class="ml-2.5 text-sm">Staff & Shifts</span></a>
            <a href="settings.html" class="flex items-center px-3 py-2.5 bg-indigo-50 text-brand rounded-xl font-bold transition-all border border-indigo-100/50 dark:bg-gray-700 dark:text-white dark:border-gray-600"><i class="fa-solid fa-gears w-5 text-sm"></i><span class="ml-2.5 text-sm">System Settings</span></a>
            <div class="mt-6 pt-6 border-t border-gray-100 dark:border-gray-700">
                <a href="pos.html" class="flex items-center px-3 py-3 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 rounded-xl font-bold transition-all shadow-sm shadow-emerald-500/10 border border-emerald-100 group dark:bg-emerald-900/20 dark:text-emerald-400 dark:border-emerald-800"><i class="fa-solid fa-cash-register w-5 text-sm group-hover:scale-110 transition-transform"></i><span class="ml-2.5 text-sm">Launch POS Terminal</span></a>
            </div>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center px-4 lg:px-8 shrink-0 z-10 dark:bg-gray-800 dark:border-gray-700">
            <button onclick="toggleSidebar()" class="lg:hidden mr-4 text-gray-500 hover:text-brand"><i class="fa-solid fa-bars text-lg"></i></button>
            <div class="text-xs font-semibold text-gray-500 bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-200 dark:bg-gray-700 dark:text-gray-300 dark:border-gray-600">
                <span class="hidden sm:inline">Qatar Enterprise Node <i class="fa-solid fa-chevron-right mx-2 text-[9px]"></i></span> <span class="text-brand font-bold">Preferences</span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-4 lg:p-8 flex flex-col md:flex-row gap-8 dark:bg-gray-900">
            <div class="w-full md:w-64 shrink-0">
                <h1 class="text-2xl font-extrabold tracking-tight text-gray-900 mb-6 dark:text-white">Settings</h1>
                <nav class="space-y-1">
                    <a href="#" class="flex items-center px-4 py-2 bg-white text-brand rounded-lg font-bold border border-gray-200 shadow-sm dark:bg-gray-800 dark:border-gray-700 dark:text-brand">
                        <i class="fa-solid fa-building w-5"></i> General Preferences
                    </a>
                </nav>
            </div>

            <div class="flex-1 max-w-3xl">
                <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-6 lg:p-8 dark:bg-gray-800 dark:border-gray-700">
                    <h2 class="text-lg font-bold text-gray-900 mb-6 border-b border-gray-100 pb-4 dark:text-white dark:border-gray-700">General Enterprise Settings</h2>
                    
                    <form class="space-y-6">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-xs font-bold text-gray-700 mb-1.5 uppercase tracking-wider dark:text-gray-300">Company Registered Name</label>
                                <input type="text" value="QatarMobileOS LLC" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-brand focus:bg-white transition-all dark:bg-gray-700 dark:border-gray-600 dark:text-white">
                            </div>
                        </div>

                        <div class="pt-6 flex flex-col sm:flex-row justify-end gap-3">
                            <button type="button" class="w-full sm:w-auto px-5 py-2 text-sm font-bold text-gray-600 hover:bg-gray-100 rounded-xl transition-colors dark:text-gray-300 dark:hover:bg-gray-700">Discard Changes</button>
                            <button type="button" class="w-full sm:w-auto px-5 py-2 bg-brand text-white text-sm font-bold rounded-xl shadow-md hover:bg-brand-dark transition-colors">Save Configuration</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleSidebar() { 
            document.getElementById('mobile-sidebar').classList.toggle('-translate-x-full'); 
            document.getElementById('sidebar-overlay').classList.toggle('hidden'); 
        }
    </script>
</body>
</html>
